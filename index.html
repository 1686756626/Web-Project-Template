<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_NAME}}</title>
    <meta name="theme-color" content="{{THEME_PRIMARY}}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: {{THEME_PRIMARY}};
            --primary-light: {{THEME_PRIMARY_LIGHT}};
            --primary-dark: {{THEME_PRIMARY_DARK}};
            --bg: {{THEME_BG}};
            --bg-card: {{THEME_BG_CARD}};
            --border: {{THEME_BORDER}};
            --text-primary: {{THEME_TEXT_PRIMARY}};
            --text-secondary: {{THEME_TEXT_SECONDARY}};
            --text-muted: {{THEME_TEXT_MUTED}};
            --nav-height: 56px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ===== Navigation ===== */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 24px; height: var(--nav-height);
        }
        .nav-logo {
            font-size: 18px; font-weight: 700; color: var(--primary);
            display: flex; align-items: center; gap: 8px;
            text-decoration: none;
        }
        .nav-tabs {
            display: flex; gap: 4px; margin-left: 32px;
        }
        .nav-tab {
            padding: 6px 16px; border-radius: 8px; border: none;
            background: transparent; color: var(--text-secondary);
            cursor: pointer; font-size: 14px; font-weight: 500;
            transition: all 0.2s; text-decoration: none;
            display: flex; align-items: center; gap: 6px;
        }
        .nav-tab:hover { color: var(--text-primary); background: rgba(0,0,0,0.04); }
        .nav-tab.active {
            background: var(--primary); color: white; font-weight: 600;
        }

        /* ===== Content ===== */
        #content {
            padding-top: var(--nav-height);
            min-height: 100vh;
        }

        /* ===== Hero ===== */
        .hero {
            text-align: center; padding: 60px 24px 40px;
            background: linear-gradient(180deg, color-mix(in srgb, var(--primary) 8%, transparent) 0%, transparent 100%);
        }
        .hero h1 {
            font-size: 42px; font-weight: 800;
            color: var(--primary-dark);
        }
        .hero p {
            margin-top: 12px; color: var(--text-secondary); font-size: 16px;
        }

        /* ===== Container ===== */
        .container {
            max-width: 800px; margin: 0 auto; padding: 0 24px 60px;
        }

        /* ===== Card ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 20px;
            transition: all 0.2s;
        }
        .card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transform: translateY(-1px);
        }

        /* ===== Animations ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== Mobile ===== */
        @media (max-width: 640px) {
            .hero h1 { font-size: 28px; }
            .nav-logo { font-size: 16px; }
            .nav-tab { padding: 6px 12px; font-size: 13px; }
        }

        /* ===== Chat Widget ===== */
        #chat-fab {
            position: fixed; bottom: 24px; right: 24px; z-index: 999;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 20px rgba(59,130,246,0.4);
            transition: all .2s;
        }
        #chat-fab:hover { transform: scale(1.1); }
        #chat-panel {
            position: fixed; bottom: 90px; right: 24px; z-index: 999;
            width: 400px; height: 520px; border-radius: 16px;
            background: var(--bg); border: 1px solid var(--border);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; overflow: hidden;
            transform: translateY(20px) scale(0.95); opacity: 0;
            transition: all .25s cubic-bezier(.4,0,.2,1);
            pointer-events: none;
        }
        #chat-panel.open {
            transform: translateY(0) scale(1); opacity: 1; pointer-events: auto;
        }
        .chat-panel-header {
            padding: 14px 16px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; display: flex; align-items: center; justify-content: space-between;
            font-weight: 700; font-size: 14px; gap: 8px;
        }
        .chat-header-btn {
            background: none; border: none; color: white; font-size: 16px;
            cursor: pointer; padding: 2px 4px; border-radius: 6px; transition: background .15s;
        }
        .chat-header-btn:hover { background: rgba(255,255,255,0.15); }
        .chat-header-title { flex: 1; text-align: center; cursor: pointer; }
        .chat-close {
            background: none; border: none; color: white; font-size: 18px;
            cursor: pointer; padding: 0 4px;
        }
        .chat-panel-body {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .chat-welcome { text-align: center; padding: 20px 0; }
        .chat-welcome-icon { font-size: 40px; margin-bottom: 8px; }
        .chat-welcome p { color: var(--text-secondary); font-size: 13px; margin: 4px 0; }
        .chat-msg { max-width: 88%; animation: fadeIn .2s; }
        .chat-msg.user { align-self: flex-end; }
        .chat-msg.ai { align-self: flex-start; }
        .chat-bubble {
            padding: 10px 14px; border-radius: 14px; font-size: 13px;
            line-height: 1.6; white-space: pre-wrap; word-break: break-word;
        }
        .chat-msg.user .chat-bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white; font-weight: 500; border-bottom-right-radius: 4px;
        }
        .chat-msg.ai .chat-bubble {
            background: var(--bg-card); border: 1px solid var(--border);
            color: var(--text-primary); border-bottom-left-radius: 4px;
        }
        .chat-panel-input {
            padding: 12px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; align-items: flex-end;
        }
        .chat-panel-input textarea {
            flex: 1; resize: none; border: 1px solid var(--border);
            background: var(--bg); color: var(--text-primary);
            border-radius: 12px; padding: 8px 12px; font-size: 13px;
            outline: none; max-height: 100px; font-family: inherit;
        }
        .chat-panel-input textarea:focus { border-color: var(--primary); }
        #chat-send-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--primary); color: white; border: none;
            font-size: 16px; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        #chat-send-btn:hover { opacity: .85; }
        #chat-send-btn:disabled { opacity: .4; cursor: not-allowed; }

        /* Chat Session Sidebar */
        .chat-session-sidebar {
            position: absolute; top: 0; left: -280px; bottom: 0;
            width: 280px; background: var(--bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: left .25s cubic-bezier(.4,0,.2,1); z-index: 5;
        }
        #chat-panel.sessions-open .chat-session-sidebar { left: 0; }
        .chat-sessions-header {
            padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px;
            color: var(--text-secondary);
        }
        .chat-new-btn {
            background: var(--primary); color: white; border: none;
            padding: 4px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600;
        }
        .chat-new-btn:hover { opacity: .85; }
        .chat-sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-loading, .chat-empty {
            text-align: center; color: var(--text-muted); font-size: 13px; padding: 24px 0;
        }
        .chat-session-item {
            position: relative; padding: 12px; border-radius: 10px; cursor: pointer;
            margin-bottom: 4px; transition: background .15s;
        }
        .chat-session-item:hover { background: rgba(0,0,0,0.04); }
        .chat-session-item.active {
            background: color-mix(in srgb, var(--primary) 12%, transparent);
            border: 1px solid color-mix(in srgb, var(--primary) 25%, transparent);
        }
        .chat-session-title {
            font-size: 13px; font-weight: 500; color: var(--text-primary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .chat-session-meta {
            font-size: 11px; color: var(--text-muted); margin-top: 4px;
            display: flex; justify-content: space-between;
        }
        .chat-session-del {
            position: absolute; top: 8px; right: 8px;
            background: none; border: none; font-size: 12px;
            cursor: pointer; opacity: 0; transition: opacity .15s; color: var(--text-muted);
        }
        .chat-session-item:hover .chat-session-del { opacity: 1; }
        .chat-session-del:hover { color: #ef4444; }

        #chat-panel.sessions-open { width: 680px; }
        @media (max-width: 720px) {
            #chat-panel { width: calc(100vw - 16px); right: 8px; bottom: 8px; height: 60vh; }
            #chat-panel.sessions-open { width: calc(100vw - 16px); }
            .chat-session-sidebar { width: 240px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="nav">
        <a class="nav-logo" href="#home">{{SITE_NAME}}</a>
        <div class="nav-tabs" id="nav-tabs">
            <!-- 由 JS 根据 CONFIG.pages 自动生成 -->
        </div>
    </nav>

    <!-- Content -->
    <div id="content"></div>

    <!-- JS 加载顺序：config → utils → app → pages -->
    <script src="config.js"></script>
    <script src="utils.js"></script>
    <script src="app.js"></script>
    <script>
        // 自动生成导航标签
        (function() {
            const tabsEl = document.getElementById('nav-tabs');
            CONFIG.pages.forEach(p => {
                const a = document.createElement('a');
                a.className = 'nav-tab';
                a.dataset.page = p.key;
                a.href = p.hash;
                a.textContent = (p.icon ? p.icon + ' ' : '') + p.label;
                if (p.key === 'home') a.classList.add('active');
                tabsEl.appendChild(a);
            });
        })();
    </script>
    <script src="pages/home.js"></script>
    <script src="pages/chat.js"></script>
</body>
</html>
